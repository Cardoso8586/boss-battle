<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Recarregar Vigor</title>
    
    <meta name="user-id" th:content="${idUsuario}" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="icon" type="image/x-icon" href="/icones/favicon.ico">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="/css/swal2-popup.css">
    
    <link rel="stylesheet" href="/css/recarregar-vigor.css">
    <link rel="stylesheet" href="/css/anuncios.css"> 
    <link rel="preload"
      href="/images/fundo-boss.webp"
      as="image">
      
        <link rel="preload"
      href="/images/logo-boss-battle.webp"
      as="image">
</head>

<body>
   <div class="logo">
        <img src="/images/logo-boss-battle.webp"
         alt="Boss Battle Arena">
     </div>
<div class="game-background"></div>

<a href="/arena" class="btn-voltar">
    <i class="fa-solid fa-arrow-left"></i>
    <span>Voltar à Arena</span>
</a>

<main class="vigor-page">

 <!-- ANÚNCIO TOPO -->
    <div class="anuncio-8">
        <div style="display:flex; justify-content:center; margin:10px 0;">
            <script>
                window.atOptions = {
                    key: "d594127d103d7640e87b4b11c19bbb17",
                    format: "iframe",
                    height: 50,
                    width: 320,
                    params: {}
                };
            </script>
            <script src="https://www.highperformanceformat.com/d594127d103d7640e87b4b11c19bbb17/invoke.js"></script>
        </div>
    </div>

<div class="energia-header">
    ⚡ Vigor:
    <span id="energiaAtual"
          th:text="${energiaGuerreirosFormatado}">0</span>
    /
    <span id="energiaMaxima"
          th:text="${energiaMaximaFormatado}">50</span>
</div>

<div class="energia-bar-bg">
    <div id="energiaBar"
         class="energia-bar"
         th:style="'width:' + (${energiaGuerreiros} * 100 / ${energiaMaxima}) + '%'">
    </div>
</div>

<form th:action="@{/guerreiros/recarregar-vigor}" method="post" class="acoes-vigor">
    <button id="btnRecarregar"
            type="button"
            th:disabled="${energiaGuerreiros >= energiaGuerreirosPadrao}">
        ⚡ Confirmar Recarregar Vigor
    </button>
</form>
        


    </section>
    
             <!-- ANUNCIO -->
    <div class="anuncio-6">

        <iframe
            src="https://zerads.com/ad/ad.php?width=300&ref=10783"
            marginwidth="0"
            marginheight="0"
            width="300"
            height="250"
            scrolling="no"
            border="0"
            frameborder="0">
        </iframe>

    </div>

    <!-- ANUNCIO -->
    <div class="anuncio-7">

        <iframe
            src="https://zerads.com/ad/ad.php?width=468&ref=10783"
            marginwidth="0"
            marginheight="0"
            width="468"
            height="60"
            scrolling="no"
            border="0"
            frameborder="0">
        </iframe>

    </div>
   
         <!-- ANUNCIO 5 -->

<div class="anuncio-5">

   <iframe src="https://zerads.com/ad/ad.php?width=728&ref=10783" 
   marginwidth="0" marginheight="0" width="728" height="90" scrolling="no" 
   border="0" frameborder="0"></iframe>

</div>
        

</main>

</body>

  <script src="/js/session-keepalive.js"></script>
  <script src="/js/global.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="/js/recarregarVigor.js"></script>  
  
  
</html>
