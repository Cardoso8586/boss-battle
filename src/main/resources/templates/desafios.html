<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="user-id" th:content="${idUsuario}">

    <title>Desafios da Arena</title>

    <link rel="icon" type="image/x-icon" href="/icones/favicon.ico">

    <link rel="stylesheet" href="/css/desafios.css">
    <link rel="stylesheet" href="/css/customClass.css">
    <link rel="stylesheet" href="/css/swal-game-error.css">
    <link rel="stylesheet" href="/css/anuncios.css">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <link rel="preload" href="/images/fundo-boss.webp" as="image">
    <link rel="preload" href="/images/logo-boss-battle.webp" as="image">
</head>

<body>

<div class="logo">
    <a href="/arena">
        <img src="/images/logo-boss-battle.webp" alt="Boss Battle Arena">
    </a>
</div>

<div class="game-background"></div>

<a href="/arena" class="btn-voltar">
    <i class="fa-solid fa-arrow-left"></i>
    <span>Voltar à Arena</span>
</a>

<main class="missoes-page">

    <!-- ANÚNCIO TOPO -->
    <div class="anuncio-8">
        <div style="display:flex; justify-content:center; margin:10px 0;">
            <script>
                window.atOptions = {
                    key: "d594127d103d7640e87b4b11c19bbb17",
                    format: "iframe",
                    height: 50,
                    width: 320,
                    params: {}
                };
            </script>
            <script src="https://www.highperformanceformat.com/d594127d103d7640e87b4b11c19bbb17/invoke.js"></script>
        </div>
    </div>

    <section id="missoes">

        <div class="missoes-header">
            <div class="icone-header">
                <i class="fa-solid fa-trophy"></i>
            </div>

            <h1>Desafios da Arena</h1>

            <p>
                Complete missões, evolua seu poder e conquiste recompensas especiais.
            </p>
        </div>

        <div class="bloco-missao">
            <div class="titulo-bloco">
                <i class="fa-solid fa-fire"></i>
                <h2>Missões Diárias</h2>
            </div>

            <div id="diarias" class="lista-missoes"></div>

            <div id="mensagem-diarias"
                 class="mensagem-vazia"
                 style="display: none;">
            </div>
        </div>

        <!-- ANÚNCIO 468x60 -->
        <div class="anuncio-13">
            <iframe src="https://zerads.com/ad/ad.php?width=468&ref=10783"
                    width="468"
                    height="60"
                    scrolling="no"
                    frameborder="0">
            </iframe>
        </div>

        <!-- ANÚNCIO 468x60 HIGH PERFORMANCE -->
        <div class="anuncio-8">
            <script>
                window.atOptions = {
                    key: "0a3b52a54a7a4d065b759366194e5a20",
                    format: "iframe",
                    height: 60,
                    width: 468,
                    params: {}
                };
            </script>
            <script src="https://www.highperformanceformat.com/0a3b52a54a7a4d065b759366194e5a20/invoke.js"></script>
        </div>

        <!-- ANÚNCIO EXTRA 468x60 -->
        <div class="modal-anuncio">
            <iframe src="https://zerads.com/ad/ad.php?width=468&ref=10783"
                    width="468"
                    height="60"
                    scrolling="no"
                    frameborder="0">
            </iframe>
        </div>

        <!-- ANÚNCIO 728x90 -->
        <div class="anuncio-12">
            <iframe src="https://zerads.com/ad/ad.php?width=728&ref=10783"
                    width="728"
                    height="90"
                    scrolling="no"
                    frameborder="0">
            </iframe>
        </div>

    </section>

</main>


<script src="/js/session-keepalive.js"></script>
<script src="/js/global.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="/js/missoesDiarias.js" defer></script>

</body>
</html>
